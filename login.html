        <main>
            <article id="loginsection">
                
                <p>Please enter your details to access your HTML course.</p>
                <fieldset class="fildsetinscr"> 
                    <legend><b>Login</b></legend>
                    <form  action="https://httpbin.org/post" method="post">
                        <label for="email">Email:</label>
                        <input class="input" type="email" name="email" id="email" required placeholder="emailemail@gmail.com">
                        <label for="password">Password:</label>
                        <input class="input" type="password" name="password" id="password" required placeholder="password">
                      
                       <div class="checkbox">
                        <input class="input"  type="checkbox" name="remember" id="remember" value="remember">
                       <label for="remember">Stay logged in</label>
                       </div>
                      
                       <a  class="link" href="#">Forgot password?</a>
                        
                        <button  class="button" type="submit">Login</button>
                    </form>
                </fieldset>
                 <p>New to our platform? <a href="sign.html" class="link">Create an account</a></p>
            </article>
        </main>
